# CI — mechanizes the constitution's §5 merge gate (CLAUDE.md):
# `cargo fmt --check`, `cargo clippy -D warnings`, and `cargo test` all green.
# Three separate jobs so branch protection can require each check by name.
name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  topology:
    name: topology
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # SPEC-0011M §5: the pure engine crate must never gain a geometric edge,
      # and the pure seam crate stays ufl-prng-only. Output captured first so a
      # cargo failure fails the step (never fails open).
      - run: |
          set -euo pipefail
          engine=$(cargo tree -p ufl-discovery -e no-dev)
          if echo "$engine" | grep -E "ufl-geo|ufl-ga"; then
            echo "TOPOLOGY VIOLATION: ufl-discovery depends on ufl-geo/ufl-ga" >&2
            exit 1
          fi
          seam=$(cargo tree -p ufl-search -e no-dev)
          if echo "$seam" | grep -E "ufl-geo|ufl-ga|ufl-core|ufl-syntax|ufl-tensor|ufl-evolve|ufl-discovery"; then
            echo "TOPOLOGY VIOLATION: ufl-search must stay ufl-prng-only" >&2
            exit 1
          fi
